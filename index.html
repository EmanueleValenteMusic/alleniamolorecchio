<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progressioni Armoniche</title>
    <style>* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
}

button,
select {
  font: inherit;
}

:root {
  color-scheme: light;
  --bg: #fff8ef;
  --surface: #ffffff;
  --surface-2: #fff1d8;
  --stroke: #f0d8b5;
  --text: #63463a;
  --text-soft: #907567;
  --pink: #ffbfd9;
  --peach: #ffd3ae;
  --yellow: #ffe98f;
  --mint: #bfecc6;
  --sky: #c7e8ff;
  --lavender: #d8ccff;
  --good: #8fd99a;
  --bad: #ff9f9a;
  --shadow: 0 8px 0 rgba(210, 166, 120, 0.18);
}

.playback-backdrop {
  position: fixed;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  z-index: 0;
  background: transparent;
  transition: opacity 260ms ease, background-color 260ms ease, background-image 260ms ease;
  overflow: hidden;
}

.playback-backdrop--visible {
  opacity: 1;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Avenir Next Rounded", "Trebuchet MS", "Chalkboard SE", sans-serif;
  transition: background 220ms ease;
}

select,
button {
  color: inherit;
}

.app-shell {
  width: min(1120px, calc(100vw - 24px));
  margin: 0 auto;
  padding: 14px 0 24px;
  position: relative;
  z-index: 1;
}

.panel {
  background: var(--surface);
  border: 3px solid var(--stroke);
  border-radius: 28px;
  box-shadow: var(--shadow);
}

.topbar,
.controls-panel,
.board-panel,
.cards-panel {
  padding: 14px;
  margin-bottom: 12px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  flex: 1 1 auto;
}

.brand__copy {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.brand__badge {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border-radius: 16px;
  background: var(--yellow);
  font-size: 1.4rem;
}

.brand h1 {
  margin: 0;
  font-size: 1.25rem;
  line-height: 1;
}

.brand p {
  margin: 3px 0 0;
  color: var(--text-soft);
  font-size: 0.88rem;
}

.brand__hint {
  white-space: nowrap;
  font-size: 0.82rem;
}

.topbar__stats,
.controls-panel__row,
.controls-panel__row--actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.controls-panel {
  display: grid;
  gap: 10px;
}

.controls-panel__row {
  justify-content: space-between;
  flex-wrap: wrap;
}

.controls-panel__row--left {
  justify-content: flex-start;
}

.controls-panel__row--left .mini-control {
  flex: 0 0 auto;
}

.controls-panel__row--actions {
  justify-content: flex-start;
  flex-wrap: wrap;
}

.sequence-strip {
  display: grid;
  grid-template-columns: repeat(var(--slot-columns, 4), minmax(120px, 1fr));
  gap: 12px;
  align-items: stretch;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 12px;
}

@media (max-width: 980px) {
  .sequence-strip {
    grid-template-columns: repeat(var(--slot-mobile-columns, 4), minmax(120px, 1fr));
  }

  .card-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}

@media (max-width: 760px) {
  .topbar,
  .controls-panel__row,
  .controls-panel__row--actions {
    flex-direction: column;
    align-items: stretch;
  }

  .card-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .sequence-strip {
    grid-template-columns: repeat(var(--slot-mobile-columns, 2), minmax(120px, 1fr));
  }

  .brand__hint {
    white-space: normal;
  }
}

@media (max-width: 560px) {
  .app-shell {
    width: min(100vw - 14px, 100%);
    padding-top: 8px;
  }

  .card-grid,
  .topbar__stats {
    display: grid;
    grid-template-columns: 1fr;
  }

  .sequence-strip {
    grid-template-columns: repeat(var(--slot-mobile-columns, 2), minmax(120px, 1fr));
  }
}

.stat-chip,
.mini-control,
.slot,
.chord-card,
.pill,
.feedback {
  border: 3px solid var(--stroke);
  box-shadow: var(--shadow);
}

.stat-chip {
  min-width: 86px;
  padding: 8px 12px;
  border-radius: 18px;
  background: var(--surface-2);
  text-align: center;
}

.stat-chip span {
  display: block;
  font-size: 0.72rem;
  color: var(--text-soft);
}

.stat-chip strong {
  display: block;
  margin-top: 2px;
}

.mini-control {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 18px;
  background: #fff;
}

.mini-control span {
  font-size: 0.8rem;
  color: var(--text-soft);
}

.mini-control select {
  border: none;
  background: transparent;
  outline: none;
}

.pill {
  border-radius: 999px;
  padding: 10px 16px;
  background: var(--peach);
  cursor: pointer;
}

.pill--play {
  background: var(--yellow);
}

.pill--soft {
  background: var(--lavender);
}

.pill:disabled {
  opacity: 0.55;
  cursor: wait;
}

.slot {
  min-height: 168px;
  padding: 8px;
  border-radius: 26px;
  background: #fffdf9;
  transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
}

.slot--hover {
  transform: translateY(-3px);
  background: #fff3b6;
}

.slot--correct {
  border-color: var(--good);
  background: #edfbea;
}

.slot--wrong {
  border-color: var(--bad);
  background: #fff0ef;
}

.slot__index {
  width: 32px;
  height: 32px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: var(--lavender);
  font-weight: 800;
}

.slot__body {
  height: calc(100% - 38px);
  margin-top: 8px;
}

.slot__empty {
  height: 100%;
  border-radius: 18px;
  border: 3px dashed #ecdcbc;
  background: #fffaf2;
}

.chord-card,
.drag-ghost {
  position: relative;
  width: 100%;
  min-height: 158px;
  padding: 14px;
  border-radius: 24px;
  background: var(--card-accent);
  text-align: left;
  cursor: grab;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: transform 160ms ease, opacity 160ms ease;
  overflow: visible;
}

.chord-card:hover {
  transform: translateY(-2px) rotate(-1deg);
}

.chord-card--tapped {
  animation: card-wiggle 260ms ease;
}

.chord-card--slot {
  min-height: 100%;
  height: 100%;
  border-radius: 20px;
}

.chord-card.is-ghosted {
  opacity: 0.34;
}

.chord-card__numeral {
  display: inline-flex;
  align-self: start;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.55);
  font-size: 0.78rem;
  font-weight: 800;
}

.chord-card strong {
  font-size: 1.5rem;
  line-height: 1;
}

.chord-card small {
  color: rgba(99, 70, 58, 0.82);
}

.card-notes-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
}

.floating-note {
  position: absolute;
  font-size: 1.35rem;
  font-weight: 800;
  opacity: 0;
  animation: float-note 820ms ease-out forwards;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
}

.backdrop-note {
  position: absolute;
  font-size: 1.5rem;
  font-weight: 800;
  color: rgba(99, 70, 58, 0.24);
  opacity: 0;
  animation: float-backdrop-note 1450ms ease-out forwards;
}

.feedback {
  margin-top: 12px;
  min-height: 52px;
  padding: 12px 14px;
  border-radius: 18px;
  background: #fff;
}

.feedback--idle {
  display: none;
}

.feedback--info {
  background: var(--sky);
}

.feedback--success {
  background: #edfbea;
  border-color: var(--good);
}

.feedback--error {
  background: #fff0ef;
  border-color: var(--bad);
}

.drag-ghost {
  position: fixed;
  inset: 0 auto auto 0;
  width: 176px;
  min-height: 158px;
  height: auto;
  pointer-events: none;
  z-index: 1000;
  transform: translate(-999px, -999px);
}

.is-dragging {
  cursor: grabbing;
}

@keyframes card-wiggle {
  0% { transform: rotate(0deg) scale(1); }
  22% { transform: rotate(-2.2deg) scale(1.02); }
  48% { transform: rotate(2.1deg) scale(1.03); }
  74% { transform: rotate(-1.1deg) scale(1.01); }
  100% { transform: rotate(0deg) scale(1); }
}

@keyframes float-note {
  0% {
    opacity: 0;
    transform: translate3d(0, 6px, 0) scale(0.9);
  }
  18% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate3d(0, -52px, 0) scale(1.18) rotate(8deg);
  }
}

@keyframes float-backdrop-note {
  0% {
    opacity: 0;
    transform: translate3d(0, 10px, 0) scale(0.9);
  }
  20% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate3d(0, -64px, 0) scale(1.2) rotate(-8deg);
  }
}</style>
